# https://hydra.cc/docs/configure_hydra/intro/

# use Hydra's built-in logging defaults so local shells do not require the
# optional `hydra-colorlog` plugin. Users who want colorlog can still override
# these groups explicitly at launch time.
defaults:
  - override hydra_logging: default
  - override job_logging: default

# output directory, generated dynamically on each run
run:
  # dir: ${paths.save_dir}/${now:%Y-%m-%d}_${now:%H-%M-%S}
  dir: ${paths.output_dir}
# sweep:
#   dir: ${paths.log_dir}/${task_name}/multiruns/${now:%Y-%m-%d}_${now:%H-%M-%S}
#   subdir: ${hydra.job.num}

job_logging:
  handlers:
    file:
      # Incorporates fix from https://github.com/facebookresearch/hydra/pull/2242
      filename: ${hydra.runtime.output_dir}/${trainer.handler}.log
