hydra:
  run:
    dir: ${paths.output_dir}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(purple)sHYDRA%(reset)s] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(blue)s%(name)s%(reset)s][%(log_color)s%(levelname)s%(reset)s]
          - %(message)s'
        log_colors:
          DEBUG: purple
          INFO: green
          WARNING: yellow
          ERROR: red
          CRITICAL: red
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${trainer.handler}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - experiment=unlearn/duet/grad_ascent_lora.yaml
    - trainer=GradAscent
    - task_name=duet_Llama-3.1-8B-Instruct_city_forget_5_ga_lora_r32_lalpha64_ldrop0p0_lr1e-3
    - model=Llama-3.1-8B-Instruct-lora
    - forget_split=city_forget_rare_5+city_forget_popular_5
    - retain_split=city_fast_retain_500
    - model.model_args.pretrained_model_name_or_path=unsloth/Llama-3.1-8B-Instruct
    - model.tokenizer_args.pretrained_model_name_or_path=unsloth/Llama-3.1-8B-Instruct
    - model.model_args.device_map=auto
    - model.model_args.low_cpu_mem_usage=true
    - model.lora_config.r=32
    - model.lora_config.lora_alpha=64
    - model.lora_config.lora_dropout=0.0
    - trainer.args.per_device_train_batch_size=1
    - trainer.args.gradient_accumulation_steps=32
    - trainer.args.num_train_epochs=5
    - trainer.args.learning_rate=1e-3
    - retain_logs_path=null
    - paths.output_dir=/workspace/unlearning/saves/unlearn/duet/ga/duet_Llama-3.1-8B-Instruct_city_forget_5_ga_lora_r32_lalpha64_ldrop0p0_lr1e-3
  job:
    name: train
    chdir: null
    override_dirname: experiment=unlearn/duet/grad_ascent_lora.yaml,forget_split=city_forget_rare_5+city_forget_popular_5,model.lora_config.lora_alpha=64,model.lora_config.lora_dropout=0.0,model.lora_config.r=32,model.model_args.device_map=auto,model.model_args.low_cpu_mem_usage=true,model.model_args.pretrained_model_name_or_path=unsloth/Llama-3.1-8B-Instruct,model.tokenizer_args.pretrained_model_name_or_path=unsloth/Llama-3.1-8B-Instruct,model=Llama-3.1-8B-Instruct-lora,paths.output_dir=/workspace/unlearning/saves/unlearn/duet/ga/duet_Llama-3.1-8B-Instruct_city_forget_5_ga_lora_r32_lalpha64_ldrop0p0_lr1e-3,retain_logs_path=null,retain_split=city_fast_retain_500,task_name=duet_Llama-3.1-8B-Instruct_city_forget_5_ga_lora_r32_lalpha64_ldrop0p0_lr1e-3,trainer.args.gradient_accumulation_steps=32,trainer.args.learning_rate=1e-3,trainer.args.num_train_epochs=5,trainer.args.per_device_train_batch_size=1,trainer=GradAscent
    id: ???
    num: ???
    config_name: unlearn.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.0
    version_base: '1.3'
    cwd: /workspace/unlearning
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/unlearning/configs
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: /workspace/unlearning/saves/unlearn/duet/ga/duet_Llama-3.1-8B-Instruct_city_forget_5_ga_lora_r32_lalpha64_ldrop0p0_lr1e-3
    choices:
      experiment: unlearn/duet/grad_ascent_lora.yaml
      paths: default
      hydra: default
      eval: duet
      eval/duet_metrics/../../generation@eval.duet.metrics.holdout_qa_rouge.generation_args: default
      eval/duet_metrics/../../collator@eval.duet.metrics.holdout_qa_rouge.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/duet_metrics/../../data/datasets@eval.duet.metrics.holdout_qa_rouge.datasets: DUET_QA_holdout
      eval/duet_metrics/../../generation@eval.duet.metrics.forget_qa_rouge.generation_args: default
      eval/duet_metrics/../../collator@eval.duet.metrics.forget_qa_rouge.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/duet_metrics/../../data/datasets@eval.duet.metrics.forget_qa_rouge.datasets: DUET_QA_forget
      collator: DataCollatorForSupervisedDataset
      data: unlearn
      data/datasets@data.eval: null
      data/datasets@data.retain: DUET_QA_retain
      data/datasets@data.forget: DUET_QA_forget
      trainer: GradAscent
      model: Llama-3.1-8B-Instruct-lora
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: colorlog
      hydra/hydra_logging: colorlog
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
