model:
  use_lora: true
  model_args:
    pretrained_model_name_or_path: /workspace/unlearning/.hf_home/models--SwetieePawsss--DUET_ft_models/snapshots/e1264db87e3b1ca297a62fe27e150af63a7fb628/llama-3.1-8b-instruct-tripunlamb-ft
    attn_implementation: eager
    torch_dtype: bfloat16
    base_model_name_or_path: null
    low_cpu_mem_usage: true
    device_map: auto
  tokenizer_args:
    pretrained_model_name_or_path: /workspace/unlearning/.hf_home/models--SwetieePawsss--DUET_ft_models/snapshots/e1264db87e3b1ca297a62fe27e150af63a7fb628/llama-3.1-8b-instruct-tripunlamb-ft
  lora_config:
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - down_proj
    - up_proj
    - lm_head
    lora_alpha: 64
    lora_dropout: 0.0
    r: 32
    bias: none
    task_type: CAUSAL_LM
  template_args:
    apply_chat_template: true
    system_prompt: You are terse and fact-only QA assistant. Reply to the question
      clearly with few-words correct answer.
    system_prompt_with_special_tokens: '<|begin_of_text|><|start_header_id|>system<|end_header_id|>


      You are terse and fact-only QA assistant. Reply to the question clearly with
      few-words correct answer.<|eot_id|>'
    user_start_tag: '<|start_header_id|>user<|end_header_id|>


      '
    user_end_tag: <|eot_id|>
    asst_start_tag: '<|start_header_id|>assistant<|end_header_id|>


      '
    asst_end_tag: <|eot_id|>
    date_string: 10 Apr 2025
trainer:
  handler: DualCF
  args:
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 16
    gradient_accumulation_steps: 4
    learning_rate: 1.0e-05
    bf16: true
    bf16_full_eval: true
    logging_steps: 10
    output_dir: ${paths.output_dir}
    logging_dir: ${trainer.args.output_dir}/logs
    report_to: tensorboard
    ddp_find_unused_parameters: false
    gradient_checkpointing: true
    optim: paged_adamw_32bit
    save_strategy: 'no'
    save_only_model: true
    weight_decay: 0.0
    do_train: true
    do_eval: false
    eval_on_start: false
    eval_strategy: 'no'
    num_train_epochs: 5
    seed: 0
    lr_scheduler_type: constant
    warmup_ratio: 0.1
    remove_unused_columns: false
  method_args:
    gamma: 1.0
    alpha: 1.0
    retain_loss_type: NLL
    beta: 0.5
    tau_d: 0.5
    tau_a: 0.5
    temp_d: 0.25
    temp_a: 0.25
    lambda_neg_max: 1.0
    lambda_ret_lo: 1.0
    lambda_ret_hi: 2.0
    cf_weight: 1.0
    risk_forget_scale: 0.5
    normalize_cf_by_tokens: true
    normalize_neg_by_tokens: true
    disable_difficulty_route: false
    disable_attribution_route: false
data:
  forget:
    DUET_QA_forget_dual_cf:
      handler: QAwithAlternateMetadataDataset
      args:
        hf_args:
          path: ${cf_dataset_path}
          split: ${cf_dataset_split}
          data_files: ${cf_dataset_data_files}
        question_key: ${question_key}
        answer_key: answer
        alternate_key: alternate
        metadata_keys:
        - difficulty_score
        - attribution_score
        - index
        return_original: true
        max_length: 512
  retain:
    DUET_QA_retain:
      handler: QADataset
      args:
        hf_args:
          path: SwetieePawsss/DUET
          split: ${retain_split}
        question_key: ${question_key}
        answer_key: answer
        max_length: 512
  anchor: forget
collator:
  DataCollatorForSupervisedDataset:
    handler: DataCollatorForSupervisedDataset
    args:
      padding_side: right
eval:
  duet:
    metrics:
      forget_qa_rouge:
        datasets:
          DUET_QA_forget:
            handler: QADataset
            args:
              hf_args:
                path: SwetieePawsss/DUET
                split: ${eval.duet.forget_split}
              question_key: ${eval.duet.question_key}
              answer_key: answer
              max_length: 512
              predict_with_generate: true
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: left
              index: index
        generation_args:
          do_sample: false
          top_p: null
          temperature: null
          max_new_tokens: 64
          use_cache: true
          repetition_penalty: null
          no_repeat_ngram_size: null
        handler: rouge
        rouge_type: rougeL_recall
        batch_size: ${eval.duet.batch_size}
      holdout_qa_rouge:
        datasets:
          DUET_QA_holdout:
            handler: QADataset
            args:
              hf_args:
                path: SwetieePawsss/DUET
                split: ${eval.duet.holdout_split}
              question_key: ${eval.duet.question_key}
              answer_key: answer
              max_length: 512
              predict_with_generate: true
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: left
              index: index
        generation_args:
          do_sample: false
          top_p: null
          temperature: null
          max_new_tokens: 64
          use_cache: true
          repetition_penalty: null
          no_repeat_ngram_size: null
        handler: rouge
        rouge_type: rougeL_recall
        batch_size: ${eval.duet.batch_size}
    handler: DUETEvaluator
    output_dir: ${paths.output_dir}
    overwrite: false
    forget_split: ${forget_split}
    holdout_split: ${holdout_split}
    retain_logs_path: ${retain_logs_path}
    question_key: ${question_key}
    batch_size: 8
paths:
  root_dir: .
  data_dir: ${paths.root_dir}/data/
  datasets: ${paths.root_dir}/configs/data/datasets
  output_dir: /workspace/unlearning/saves/unlearn/duet/dual_cf/duet_Llama-3.1-8B-Instruct_city_forget_5_dual_cf_lora_r32_lalpha64_ldrop0p0_lr1e-5_beta0p5_alpha1p0_gamma1p0_td0p5_ta0p5_sd0p25_sa0p25_ln1p0_rlo1p0_rhi2p0_cf1p0_rf0p5_dOn_aOn
  work_dir: ${hydra:runtime.cwd}
forget_split: city_forget_rare_5+city_forget_popular_5
retain_split: city_fast_retain_500
holdout_split: ${retain_split}
retain_logs_path: null
question_key: question
cf_dataset_path: json
cf_dataset_split: train
cf_dataset_data_files: /workspace/unlearning/artifacts/dualcf/duet_merged_dualcf.jsonl
task_name: duet_Llama-3.1-8B-Instruct_city_forget_5_dual_cf_lora_r32_lalpha64_ldrop0p0_lr1e-5_beta0p5_alpha1p0_gamma1p0_td0p5_ta0p5_sd0p25_sa0p25_ln1p0_rlo1p0_rhi2p0_cf1p0_rf0p5_dOn_aOn
mode: unlearn
