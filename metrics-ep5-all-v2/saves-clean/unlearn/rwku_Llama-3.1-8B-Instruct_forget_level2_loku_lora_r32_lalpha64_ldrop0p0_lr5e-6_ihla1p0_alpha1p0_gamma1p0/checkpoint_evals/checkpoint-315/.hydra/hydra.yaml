hydra:
  run:
    dir: ${paths.output_dir}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(purple)sHYDRA%(reset)s] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(blue)s%(name)s%(reset)s][%(log_color)s%(levelname)s%(reset)s]
          - %(message)s'
        log_colors:
          DEBUG: purple
          INFO: green
          WARNING: yellow
          ERROR: red
          CRITICAL: red
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/eval.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - experiment=eval/rwku/default.yaml
    - model=Llama-3.1-8B-Instruct-lora
    - forget_split=forget_level2
    - holdout_split=neighbor_level2
    - task_name=rwku_Llama-3.1-8B-Instruct_merged_loku_lora_r32_lalpha64_ldrop0p0_lr5e-6_ihla1p0_alpha1p0_gamma1p0_checkpoint-315
    - model.model_args.pretrained_model_name_or_path=/data/home/vkropoti/unlearning/saves/unlearn/rwku_Llama-3.1-8B-Instruct_merged_loku_lora_r32_lalpha64_ldrop0p0_lr5e-6_ihla1p0_alpha1p0_gamma1p0/checkpoint-315
    - ++model.model_args.base_model_name_or_path=/data/home/vkropoti/unlearning/fila_base_tmp/gpu1_lr5e-6_phase_all/rwku_Llama-3.1-8B-Instruct_merged_loku_lora_r32_lalpha64_ldrop0p0_lr5e-6_ihla1p0_alpha1p0_gamma1p0
    - model.tokenizer_args.pretrained_model_name_or_path=/data/home/vkropoti/unlearning/models/BASE/Llama-3.1-8B-Instruct
    - model.model_args.device_map=auto
    - ++model.model_args.low_cpu_mem_usage=true
    - eval.duet.batch_size=512
    - eval.duet.overwrite=true
    - paths.output_dir=/data/home/vkropoti/unlearning/saves/unlearn/rwku_Llama-3.1-8B-Instruct_merged_loku_lora_r32_lalpha64_ldrop0p0_lr5e-6_ihla1p0_alpha1p0_gamma1p0/checkpoint_evals/checkpoint-315
    - retain_logs_path=null
  job:
    name: eval
    chdir: null
    override_dirname: ++model.model_args.base_model_name_or_path=/data/home/vkropoti/unlearning/fila_base_tmp/gpu1_lr5e-6_phase_all/rwku_Llama-3.1-8B-Instruct_merged_loku_lora_r32_lalpha64_ldrop0p0_lr5e-6_ihla1p0_alpha1p0_gamma1p0,++model.model_args.low_cpu_mem_usage=true,eval.duet.batch_size=512,eval.duet.overwrite=true,experiment=eval/rwku/default.yaml,forget_split=forget_level2,holdout_split=neighbor_level2,model.model_args.device_map=auto,model.model_args.pretrained_model_name_or_path=/data/home/vkropoti/unlearning/saves/unlearn/rwku_Llama-3.1-8B-Instruct_merged_loku_lora_r32_lalpha64_ldrop0p0_lr5e-6_ihla1p0_alpha1p0_gamma1p0/checkpoint-315,model.tokenizer_args.pretrained_model_name_or_path=/data/home/vkropoti/unlearning/models/BASE/Llama-3.1-8B-Instruct,model=Llama-3.1-8B-Instruct-lora,paths.output_dir=/data/home/vkropoti/unlearning/saves/unlearn/rwku_Llama-3.1-8B-Instruct_merged_loku_lora_r32_lalpha64_ldrop0p0_lr5e-6_ihla1p0_alpha1p0_gamma1p0/checkpoint_evals/checkpoint-315,retain_logs_path=null,task_name=rwku_Llama-3.1-8B-Instruct_merged_loku_lora_r32_lalpha64_ldrop0p0_lr5e-6_ihla1p0_alpha1p0_gamma1p0_checkpoint-315
    id: ???
    num: ???
    config_name: eval.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
