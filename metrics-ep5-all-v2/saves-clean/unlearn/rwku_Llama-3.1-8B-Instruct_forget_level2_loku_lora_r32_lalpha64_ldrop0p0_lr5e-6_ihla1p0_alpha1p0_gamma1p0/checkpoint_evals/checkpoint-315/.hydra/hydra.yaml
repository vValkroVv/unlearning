      eval/rwku_metrics/../../data/datasets@eval.duet.metrics.holdout_qa_rouge.datasets: RWKU_QA_holdout
      eval/rwku_metrics/../../generation@eval.duet.metrics.forget_qa_rouge.generation_args: default
      eval/rwku_metrics/../../collator@eval.duet.metrics.forget_qa_rouge.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/rwku_metrics/../../data/datasets@eval.duet.metrics.forget_qa_rouge.datasets: RWKU_QA_forget
      model: Llama-3.1-8B-Instruct-lora
      hydra/env: default
