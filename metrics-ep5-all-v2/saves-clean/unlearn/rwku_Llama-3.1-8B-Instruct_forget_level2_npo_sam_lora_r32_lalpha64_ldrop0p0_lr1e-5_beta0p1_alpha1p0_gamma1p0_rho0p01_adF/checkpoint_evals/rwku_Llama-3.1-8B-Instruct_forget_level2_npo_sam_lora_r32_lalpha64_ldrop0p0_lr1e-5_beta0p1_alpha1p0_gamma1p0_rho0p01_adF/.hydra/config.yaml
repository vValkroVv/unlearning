eval:
  duet:
    metrics:
      forget_qa_rouge:
        datasets:
          RWKU_QA_forget:
            handler: QADataset
            args:
              hf_args:
                path: SwetieePawsss/exp_r
                name: ${eval.duet.forget_split}
                split: test
              question_key: ${eval.duet.question_key}
              answer_key: answer
              max_length: 512
              predict_with_generate: true
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: left
              index: index
        generation_args:
          do_sample: false
          top_p: null
          temperature: null
          max_new_tokens: 64
          use_cache: true
          repetition_penalty: null
          no_repeat_ngram_size: null
        handler: rouge
        rouge_type: rougeL_recall
        batch_size: ${eval.duet.batch_size}
      holdout_qa_rouge:
        datasets:
          RWKU_QA_holdout:
            handler: QADataset
            args:
              hf_args:
                path: SwetieePawsss/exp_r
                name: ${eval.duet.holdout_split}
                split: test
              question_key: ${eval.duet.question_key}
              answer_key: answer
              max_length: 512
              predict_with_generate: true
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: left
              index: index
        generation_args:
          do_sample: false
          top_p: null
          temperature: null
          max_new_tokens: 64
          use_cache: true
          repetition_penalty: null
          no_repeat_ngram_size: null
        handler: rouge
        rouge_type: rougeL_recall
        batch_size: ${eval.duet.batch_size}
    handler: DUETEvaluator
    output_dir: ${paths.output_dir}
    overwrite: true
    forget_split: ${forget_split}
    holdout_split: ${holdout_split}
    retain_logs_path: ${retain_logs_path}
    question_key: ${question_key}
    batch_size: 512
