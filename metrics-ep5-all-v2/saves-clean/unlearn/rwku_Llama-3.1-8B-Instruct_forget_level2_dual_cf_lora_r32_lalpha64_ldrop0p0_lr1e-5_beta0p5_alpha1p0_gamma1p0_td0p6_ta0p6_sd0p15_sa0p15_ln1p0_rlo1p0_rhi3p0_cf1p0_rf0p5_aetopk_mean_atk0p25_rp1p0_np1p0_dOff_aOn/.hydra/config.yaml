model:
  use_lora: true
  model_args:
    pretrained_model_name_or_path: /data/home/vkropoti/unlearning/models/BASE/Llama-3.1-8B-Instruct
    attn_implementation: eager
    torch_dtype: bfloat16
    base_model_name_or_path: null
    low_cpu_mem_usage: true
    device_map: auto
  tokenizer_args:
    pretrained_model_name_or_path: /data/home/vkropoti/unlearning/models/BASE/Llama-3.1-8B-Instruct
  lora_config:
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    lora_alpha: 64
    lora_dropout: 0.0
    r: 32
    bias: none
    task_type: CAUSAL_LM
  template_args:
    apply_chat_template: true
    system_prompt: You are terse and fact-only QA assistant. Reply to the question
      clearly with few-words correct answer.
    system_prompt_with_special_tokens: '<|begin_of_text|><|start_header_id|>system<|end_header_id|>


      You are terse and fact-only QA assistant. Reply to the question clearly with
      few-words correct answer.<|eot_id|>'
    user_start_tag: '<|start_header_id|>user<|end_header_id|>


      '
    user_end_tag: <|eot_id|>
    asst_start_tag: '<|start_header_id|>assistant<|end_header_id|>


      '
    asst_end_tag: <|eot_id|>
    date_string: 10 Apr 2025
trainer:
  handler: DualCF
  args:
    per_device_train_batch_size: 16
    per_device_eval_batch_size: 16
    gradient_accumulation_steps: 2
    learning_rate: 1.0e-05
    bf16: true
    bf16_full_eval: true
    logging_steps: 22
    output_dir: ${paths.output_dir}
    logging_dir: ${trainer.args.output_dir}/logs
    report_to: tensorboard
    ddp_find_unused_parameters: false
    gradient_checkpointing: false
    optim: paged_adamw_32bit
    save_strategy: steps
    save_only_model: true
    weight_decay: 0.0
    do_train: true
    do_eval: false
    eval_on_start: false
    eval_strategy: 'no'
    num_train_epochs: 5
    seed: 0
    lr_scheduler_type: constant
    warmup_ratio: 0.1
    logging_strategy: steps
    remove_unused_columns: false
    save_steps: 45
    save_total_limit: 12
    save_safetensors: true
    load_best_model_at_end: false
  method_args:
    gamma: 1.0
    alpha: 1.0
    retain_loss_type: NLL
    beta: 0.5
    tau_d: 0.6
    tau_a: 0.6
    temp_d: 0.15
    temp_a: 0.15
    lambda_neg_max: 1.0
    lambda_ret_lo: 1.0
    lambda_ret_hi: 3.0
    cf_weight: 1.0
    risk_forget_scale: 0.5
    normalize_cf_by_tokens: true
    normalize_neg_by_tokens: true
    disable_difficulty_route: true
    disable_attribution_route: false
    alpha_eff_stat: topk_mean
    alpha_eff_topk_frac: 0.25
    risk_power: 1.0
    neg_power: 1.0
  trace_jsonl: true
data:
  forget:
    RWKU_QA_forget_dual_cf:
      handler: QAwithAlternateMetadataDataset
      args:
        hf_args:
          path: ${cf_dataset_path}
          name: ${cf_dataset_name}
          split: ${cf_dataset_split}
          data_files: ${cf_dataset_data_files}
        question_key: ${question_key}
        answer_key: answer
        alternate_key: alternate
        metadata_keys:
        - difficulty_score
        - attribution_score
        - index
        return_original: true
        max_length: 512
  retain:
    RWKU_QA_retain:
      handler: QADataset
      args:
        hf_args:
          path: SwetieePawsss/exp_r
          name: ${retain_split}
          split: test
        question_key: ${question_key}
        answer_key: answer
        max_length: 512
  anchor: forget
collator:
  DataCollatorForSupervisedDataset:
    handler: DataCollatorForSupervisedDataset
    args:
      padding_side: right
eval:
  duet:
    metrics:
      forget_qa_rouge:
        datasets:
          RWKU_QA_forget:
            handler: QADataset
            args:
              hf_args:
                path: SwetieePawsss/exp_r
                name: ${eval.duet.forget_split}
                split: test
              question_key: ${eval.duet.question_key}
              answer_key: answer
              max_length: 512
              predict_with_generate: true
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: left
              index: index
        generation_args:
          do_sample: false
          top_p: null
          temperature: null
          max_new_tokens: 64
          use_cache: true
          repetition_penalty: null
          no_repeat_ngram_size: null
        handler: rouge
        rouge_type: rougeL_recall
        batch_size: ${eval.duet.batch_size}
      holdout_qa_rouge:
        datasets:
          RWKU_QA_holdout:
            handler: QADataset
            args:
              hf_args:
                path: SwetieePawsss/exp_r
                name: ${eval.duet.holdout_split}
                split: test
              question_key: ${eval.duet.question_key}
              answer_key: answer
              max_length: 512
              predict_with_generate: true
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: left
              index: index
        generation_args:
          do_sample: false
          top_p: null
          temperature: null
          max_new_tokens: 64
          use_cache: true
          repetition_penalty: null
          no_repeat_ngram_size: null
        handler: rouge
        rouge_type: rougeL_recall
        batch_size: ${eval.duet.batch_size}
    handler: DUETEvaluator
    output_dir: ${paths.output_dir}
    overwrite: false
    forget_split: ${forget_split}
    holdout_split: ${holdout_split}
    retain_logs_path: ${retain_logs_path}
    question_key: ${question_key}
    batch_size: 8
paths:
  root_dir: .
  data_dir: ${paths.root_dir}/data/
  datasets: ${paths.root_dir}/configs/data/datasets
  output_dir: /data/home/vkropoti/unlearning/saves/unlearn/rwku_Llama-3.1-8B-Instruct_forget_level2_dual_cf_lora_r32_lalpha64_ldrop0p0_lr1e-5_beta0p5_alpha1p0_gamma1p0_td0p6_ta0p6_sd0p15_sa0p15_ln1p0_rlo1p0_rhi3p0_cf1p0_rf0p5_aetopk_mean_atk0p25_rp1p0_np1p0_dOff_aOn
  work_dir: ${hydra:runtime.cwd}
forget_split: forget_level2
retain_split: neighbor_level2
holdout_split: ${retain_split}
retain_logs_path: null
question_key: query
cf_dataset_path: json
cf_dataset_name: null
cf_dataset_split: train
cf_dataset_data_files: /data/home/vkropoti/unlearning/artifacts/dualcf/rwku/llama31_8b_level2_v2/dualcf_forget_level2_v2.jsonl
task_name: rwku_Llama-3.1-8B-Instruct_forget_level2_dual_cf_lora_r32_lalpha64_ldrop0p0_lr1e-5_beta0p5_alpha1p0_gamma1p0_td0p6_ta0p6_sd0p15_sa0p15_ln1p0_rlo1p0_rhi3p0_cf1p0_rf0p5_aetopk_mean_atk0p25_rp1p0_np1p0_dOff_aOn
mode: unlearn
